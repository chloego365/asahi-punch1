<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Asahi Cafe 打卡系統</title>
  <style>
    body { font-family: 'PingFang TC', sans-serif; background: #FAF9F6; text-align: center; color: #5D4037; padding: 40px 20px; margin: 0; }
    .card { background: white; border-radius: 24px; padding: 35px 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 400px; margin: auto; }
    h2 { margin-top: 0; letter-spacing: 1px; }
    .btn { width: 100%; padding: 18px; margin: 12px 0; font-size: 18px; border: none; border-radius: 50px; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .btn-in { background: #6B8E23; box-shadow: 0 4px #556B2F; }
    .btn-out { background: #BC8F8F; box-shadow: 0 4px #A07070; }
    .btn:active { transform: translateY(4px); box-shadow: none; }
    select, input { width: 100%; padding: 15px; font-size: 16px; border-radius: 12px; border: 1px solid #DDD; margin-bottom: 20px; box-sizing: border-box; outline: none; }
    #status { margin-top: 15px; font-weight: bold; color: #8D6E63; min-height: 24px; font-size: 14px; }
  </style>
</head>
<body>

  <div class="card">
    <div id="setup-section" style="display:none;">
      <h3>☕ Asahi Cafe 身分設定</h3>
      <p style="color:#8D6E63; font-size:14px;">請選擇姓名並輸入驗證碼</p>
      <select id="name-selector">
        <option value="">-- 請選擇姓名 --</option>
        <option value="Gino">Gino</option>
        <option value="陳品潔">陳品潔</option>
        <option value="Izumi">Izumi</option>
        <option value="山本勇太">山本勇太</option>
      </select>
      <input type="password" id="user-password" placeholder="輸入 4 位數密碼" inputmode="numeric">
      <button class="btn" style="background:#8D6E63" onclick="saveName()">驗證並登入</button>
    </div>

    <div id="punch-section" style="display:none;">
      <h2 id="greeting-text">你好！</h2>
      <p id="sub-greeting" style="color:#8D6E63; margin-bottom:25px;">今天也要沖出好咖啡喔 ☕</p>
      
      <button class="btn btn-in" onclick="checkLocationAndPunch('上班')">🌅 上班打卡</button>
      <button class="btn btn-out" onclick="checkLocationAndPunch('下班')">🌇 下班打卡</button>
      
      <div id="status"></div>
      <p style="font-size:11px; color:#CCC; margin-top:40px; cursor:pointer;" onclick="resetName()">切換使用者 / 重設身分</p>
    </div>
  </div>

  <script>
    // === [ 請填寫您的 GAS 網址 ] ===
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzLNxnyqmAKBSqLqVFzC45qmYP2aGRRVvFkMHpd1KIN48WiMxE_sqXYb_nf2jKM52Wh/exec"; 
    // =============================

    document.addEventListener('DOMContentLoaded', function() {
      const savedUser = localStorage.getItem('asahi_employee_name');
      if (!savedUser) {
        document.getElementById('setup-section').style.display = 'block';
      } else {
        showPunchPage(savedUser);
      }
    });

    function saveName() {
      const name = document.getElementById('name-selector').value;
      const pwd = document.getElementById('user-password').value;
      if (name && pwd) {
        localStorage.setItem('asahi_employee_name', name);
        localStorage.setItem('asahi_employee_password', pwd);
        showPunchPage(name);
      } else {
        alert("請輸入完整資訊");
      }
    }

    function showPunchPage(name) {
      document.getElementById('setup-section').style.display = 'none';
      document.getElementById('punch-section').style.display = 'block';
      document.getElementById('greeting-text').innerText = "你好，" + name + "！";
    }

    function checkLocationAndPunch(type) {
      const statusDisp = document.getElementById('status');
      statusDisp.innerText = "正在取得 GPS 位置...";
      
      if (!navigator.geolocation) {
        statusDisp.innerText = "瀏覽器不支援定位";
        return;
      }

      navigator.geolocation.getCurrentPosition(function(position) {
        doPunch(type, position.coords.latitude, position.coords.longitude);
      }, function() {
        statusDisp.innerText = "打卡失敗：請開啟 GPS 授權";
      }, { enableHighAccuracy: true });
    }

    function doPunch(type, lat, lon) {
  const name = localStorage.getItem('asahi_employee_name');
  const pwd = localStorage.getItem('asahi_employee_password');
  const statusDisp = document.getElementById('status');
  
  // 1. 抓取當下的時間
  const now = new Date();
  const timeString = now.getHours().toString().padStart(2, '0') + ":" + 
                     now.getMinutes().toString().padStart(2, '0') + ":" + 
                     now.getSeconds().toString().padStart(2, '0');

  statusDisp.innerText = "同步紀錄中...";
  
  fetch(GAS_URL, {
    method: "POST",
    mode: "no-cors", 
    body: JSON.stringify({ 
      name: name, 
      type: type, 
      password: pwd,
      lat: lat,
      lon: lon
    })
  }).then(() => {
    // 打卡成功後的震動與提醒
    if ("vibrate" in navigator) navigator.vibrate(200);
    
    // 2. 更新畫面顯示具體時間
    alert(`${type} 打卡成功！\n時間：${timeString}`);
    
    // 3. 讓 status 區域顯示更詳細的資訊
    statusDisp.innerHTML = `<span style="color: #6B8E23;">✅ ${type}完成：${timeString}</span>`;
    
    // 如果是下班，可以換個溫馨的語錄
    if (type === '下班') {
       document.getElementById('sub-greeting').innerText = "辛苦了！回家路上小心。";
    }
  }).catch(err => {
    alert("連線失敗，請檢查網路");
    statusDisp.innerText = "連線失敗";
  });
}

    function resetName() {
      if (confirm("確定要重設身份嗎？下一次進入需重新輸入密碼。")) {
        localStorage.removeItem('asahi_employee_name');
        localStorage.removeItem('asahi_employee_password');
        location.reload();
      }
    }
  </script>
</body>
</html>
